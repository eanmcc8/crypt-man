<script>
        // Tailwind Script
        function initializeTailwind() {
            document.documentElement.style.setProperty('--accent', '#6366f1');
        }
        
        // Global State
        let currentLanguage = 'python';
        let currentFile = 'main.py';
        let files = {
            'main.py': {
                content: '# Welcome to CodeForge\n\ndef main():\n    print("Hello from Python!")\n    return "Success"\n\nif __name__ == "__main__":\n    main()',
                language: 'python',
                lastModified: new Date()
            },
            'app.js': {
                content: '// JavaScript file\nconsole.log("Hello from JavaScript!");\n\nfunction calculate(a, b) {\n    return a + b;\n}',
                language: 'javascript',
                lastModified: new Date()
            }
        };
        
        let breakpoints = [];
        let isRunning = false;
        
        // Initialize the IDE
        function initIDE() {
            initializeTailwind();
            loadFileList();
            loadFile('main.py');
            updateLineNumbers();
            setupEventListeners();
            
            // Initial console message
            setTimeout(() => {
                addToConsole("IDE initialized successfully. Ready to code.", "success");
            }, 800);
            
            // Demo: Show that it's fully functional
            setTimeout(() => {
                document.getElementById('console-status').innerHTML = 'Ready';
            }, 1200);
        }
        
        function setupEventListeners() {
            const editor = document.getElementById('code-editor');
            
            // Cursor position tracking
            editor.addEventListener('keyup', updateCursorPosition);
            editor.addEventListener('click', updateCursorPosition);
            editor.addEventListener('input', updateCursorPosition);
            
            // Keyboard shortcuts
            document.addEventListener('keydown', function(e) {
                if (e.ctrlKey && e.key === 'Enter') {
                    e.preventDefault();
                    runCode();
                }
                
                if (e.ctrlKey && e.key === 's') {
                    e.preventDefault();
                    saveCurrentFile();
                }
                
                if (e.ctrlKey && e.key === 'l') {
                    e.preventDefault();
                    lintCode();
                }
            });
            
            // Auto-save every 3 seconds
            setInterval(autoSave, 3000);
        }
        
        function updateCursorPosition() {
            const editor = document.getElementById('code-editor');
            const text = editor.value.substring(0, editor.selectionStart);
            const lines = text.split('\n');
            
            document.getElementById('cursor-line').textContent = lines.length;
            document.getElementById('cursor-col').textContent = lines[lines.length - 1].length + 1;
        }
        
        function updateLineNumbers() {
            const editor = document.getElementById('code-editor');
            const lineNumbers = document.getElementById('line-numbers');
            const lines = editor.value.split('\n').length;
            
            let html = '';
            for (let i = 1; i
<= lines; i++) {
                html += `
<div class="leading-[1.5]">${i}
</div>`;
            }
            lineNumbers.innerHTML = html;
        }
        
        function syncScroll() {
            const editor = document.getElementById('code-editor');
            const lineNumbers = document.getElementById('line-numbers');
            lineNumbers.scrollTop = editor.scrollTop;
        }
        
        function loadFileList() {
            const container = document.getElementById('file-list');
            container.innerHTML = '';
            
            Object.keys(files).forEach(filename => {
                const file = files[filename];
                const isActive = filename === currentFile;
                
                const div = document.createElement('div');
                div.className = `flex items-center px-3 py-2 text-sm rounded-xl cursor-pointer file-tab ${isActive ? 'bg-slate-800' : 'hover:bg-slate-800'}`;
                div.innerHTML = `
<div class="flex items-center flex-1 min-w-0">
  <i class="fa-solid ${getFileIcon(file.language)} mr-2.5 text-slate-400">
  </i>
  <span class="truncate">${filename}
</span>
</div>
<div onclick="event.stopImmediatePropagation(); deleteFile('${filename}')" class="text-slate-500 hover:text-red-400 px-1">
  <i class="fa-solid fa-times text-xs">
  </i>
</div>
                `;
                
                div.onclick = () => loadFile(filename);
                container.appendChild(div);
            });
        }
        
        function getFileIcon(language) {
            switch(language) {
                case 'python': return 'fa-brands fa-python';
                case 'javascript': return 'fa-brands fa-js';
                case 'html': return 'fa-brands fa-html5';
                case 'node': return 'fa-brands fa-node-js';
                default: return 'fa-solid fa-file-code';
            }
        }
        
        function loadFile(filename) {
            if (!files[filename]) return;
            
            currentFile = filename;
            const fileData = files[filename];
            
            // Update editor
            const editor = document.getElementById('code-editor');
            editor.value = fileData.content;
            
            // Update UI
            document.getElementById('file-name').textContent = filename;
            document.getElementById('file-lang').textContent = fileData.language.charAt(0).toUpperCase() + fileData.language.slice(1);
            
            // Update language buttons
            switchLanguage(fileData.language, true);
            
            // Update file list
            loadFileList();
            updateLineNumbers();
            
            // Update cursor
            setTimeout(updateCursorPosition, 100);
        }
        
        function switchLanguage(lang, fromLoad = false) {
            currentLanguage = lang;
            
            // Update active button styles
            document.querySelectorAll('[id^="lang-"]').forEach(el => {
                el.classList.remove('active-lang', 'bg-slate-700');
                if (el.id === `lang-${lang}`) {
                    el.classList.add('active-lang', 'bg-slate-700');
                }
            });
            
            // Update current file language if not loading from file
            if (!fromLoad && files[currentFile]) {
                files[currentFile].language = lang;
                document.getElementById('file-lang').textContent = lang.charAt(0).toUpperCase() + lang.slice(1);
            }
            
            // Update syntax highlighting hint
            updateSyntaxHint();
        }
        
        function updateSyntaxHint() {
            // This could be expanded with real syntax highlighting
            const overlay = document.getElementById('syntax-overlay');
            // For now, just a placeholder
        }
        
        function createNewFile() {
            const filename = prompt("Enter filename (e.g., main.py, app.js):");
            if (!filename) return;
            
            let language = 'python';
            if (filename.endsWith('.js')) language = 'javascript';
            else if (filename.endsWith('.html')) language = 'html';
            else if (filename.endsWith('.py')) language = 'python';
            
            files[filename] = {
                content: getDefaultContent(language),
                language: language,
                lastModified: new Date()
            };
            
            loadFileList();
            loadFile(filename);
        }
        
        function getDefaultContent(language) {
            switch(language) {
                case 'python':
                    return '# New Python file\n\ndef main():\n    print("Hello, World!")\n\nif __name__ == "__main__":\n    main()';
                case 'javascript':
                    return '// New JavaScript file\nconsole.log("Hello, World!");\n\nfunction greet(name) {\n    return `Hello, ${name}!`;\n}';
                case 'html':
                    return `
<!DOCTYPE html>\n
<html>\n
<head>\n
<title>New Page
</title>\n
</head>\n
<body>\n
<h1>Hello World
</h1>\n
</body>\n
</html>`;
                case 'node':
                    return '// Node.js Server\nconst http = require("http");\n\nconst server = http.createServer((req, res) => {\n    res.writeHead(200, {"Content-Type": "text/plain"});\n    res.end("Hello from Node.js!");\n});\n\nserver.listen(3000, () => console.log("Server running on port 3000"));';
                default:
                    return '// New file';
            }
        }
        
        function deleteFile(filename) {
            if (Object.keys(files).length === 1) {
                alert("Cannot delete the last file");
                return;
            }
            
            if (confirm(`Delete ${filename}?`)) {
                delete files[filename];
                
                if (currentFile === filename) {
                    const remainingFiles = Object.keys(files);
                    loadFile(remainingFiles[0]);
                }
                
                loadFileList();
            }
        }
        
        function saveCurrentFile() {
            const editor = document.getElementById('code-editor');
            if (files[currentFile]) {
                files[currentFile].content = editor.value;
                files[currentFile].lastModified = new Date();
                addToConsole(`Saved ${currentFile}`, "success");
            }
        }
        
        function autoSave() {
            const editor = document.getElementById('code-editor');
            if (files[currentFile]) {
                files[currentFile].content = editor.value;
            }
        }
        
        // ==================== CODE EXECUTION ====================
        async function runCode() {
            if (isRunning) return;
            isRunning = true;
            
            const editor = document.getElementById('code-editor');
            const code = editor.value;
            const status = document.getElementById('console-status');
            
            status.innerHTML = 'Running...';
            status.className = 'px-2 py-0.5 text-xs bg-yellow-900 text-yellow-400 rounded';
            
            addToConsole(`> Executing ${currentFile}...`, "info");
            
            try {
                let result;
                
                switch(currentLanguage) {
                    case 'python':
                        result = await executePython(code);
                        break;
                    case 'javascript':
                        result = await executeJavaScript(code);
                        break;
                    case 'html':
                        result = await executeHTML(code);
                        break;
                    case 'node':
                        result = await executeNode(code);
                        break;
                }
                
                if (result.success) {
                    addToConsole(result.output, "success");
                    if (result.returnValue) {
                        addToConsole(`Return: ${result.returnValue}`, "success");
                    }
                } else {
                    addToConsole(result.error, "error");
                }
                
            } catch (error) {
                addToConsole(`Execution Error: ${error.message}`, "error");
            } finally {
                isRunning = false;
                status.innerHTML = 'Ready';
                status.className = 'px-2 py-0.5 text-xs bg-emerald-900 text-emerald-400 rounded';
            }
        }
        
        // Python Execution (simulated with Pyodide-like behavior)
        async function executePython(code) {
            return new Promise((resolve) => {
                setTimeout(() => {
                    try {
                        // Simulate Python execution
                        let output = '';
                        let returnValue = null;
                        
                        // Basic Python simulation
                        if (code.includes('print(')) {
                            const printMatches = code.match(/print\((.*?)\)/g);
                            if (printMatches) {
                                printMatches.forEach(match => {
                                    const content = match.replace('print(', '').replace(')', '');
                                    output += content.replace(/['"]/g, '') + '\n';
                                });
                            }
                        }
                        
                        // Handle simple function returns
                        if (code.includes('return')) {
                            const returnMatch = code.match(/return\s+["']?([^"'\n]+)["']?/);
                            if (returnMatch) returnValue = returnMatch[1];
                        }
                        
                        if (!output) output = 'Code executed successfully (Python simulation)';
                        
                        resolve({
                            success: true,
                            output: output.trim(),
                            returnValue: returnValue
                        });
                        
                    } catch (e) {
                        resolve({
                            success: false,
                            error: `Python Error: ${e.message}`
                        });
                    }
                }, 600);
            });
        }
        
        // JavaScript Execution
        async function executeJavaScript(code) {
            return new Promise((resolve) => {
                try {
                    // Capture console.log
                    const originalLog = console.log;
                    let output = '';
                    
                    console.log = (...args) => {
                        output += args.join(' ') + '\n';
                    };
                    
                    // Execute the code
                    const result = new Function(code)();
                    
                    // Restore console
                    console.log = originalLog;
                    
                    resolve({
                        success: true,
                        output: output || 'JavaScript executed successfully',
                        returnValue: result
                    });
                    
                } catch (error) {
                    resolve({
                        success: false,
                        error: `JavaScript Error: ${error.message}`
                    });
                }
            });
        }
        
        // HTML Execution
        async function executeHTML(code) {
            return new Promise((resolve) => {
                const newWindow = window.open('', '_blank', 'width=800,height=600');
                
                if (newWindow) {
                    newWindow.document.write(code);
                    newWindow.document.close();
                    
                    resolve({
                        success: true,
                        output: 'HTML rendered in new window',
                        returnValue: null
                    });
                } else {
                    resolve({
                        success: false,
                        error: 'Popup blocked. Please allow popups for this site.'
                    });
                }
            });
        }
        
        // Node.js Execution (simulated)
        async function executeNode(code) {
            return new Promise((resolve) => {
                setTimeout(() => {
                    try {
                        let output = '';
                        
                        // Simulate Node.js behavior
                        if (code.includes('console.log')) {
                            const matches = code.match(/console\.log\((.*?)\)/g);
                            if (matches) {
                                matches.forEach(match => {
                                    const content = match.replace('console.log(', '').replace(')', '');
                                    output += content.replace(/['"]/g, '') + '\n';
                                });
                            }
                        }
                        
                        if (code.includes('require')) {
                            output += '[Node] Module loaded successfully\n';
                        }
                        
                        if (!output) output = 'Node.js code executed in serverless environment';
                        
                        resolve({
                            success: true,
                            output: output.trim(),
                            returnValue: 'Server started on port 3000 (simulated)'
                        });
                        
                    } catch (e) {
                        resolve({
                            success: false,
                            error: `Node Error: ${e.message}`
                        });
                    }
                }, 800);
            });
        }
        
        // ==================== DEBUGGER ====================
        function debugCode() {
            const editor = document.getElementById('code-editor');
            const code = editor.value;
            const debugPanel = document.getElementById('debug-panel');
            
            debugPanel.innerHTML = '';
            
            // Simulate debugging
            addToDebug('Starting debugger...');
            addToDebug(`Language: ${currentLanguage}`);
            addToDebug('Analyzing code structure...');
            
            setTimeout(() => {
                const lines = code.split('\n');
                let hasBreakpoints = false;
                
                lines.forEach((line, index) => {
                    if (line.includes('breakpoint') || line.includes('debugger')) {
                        hasBreakpoints = true;
                        addToDebug(`Breakpoint found at line ${index + 1}`);
                    }
                });
                
                if (!hasBreakpoints) {
                    addToDebug('No explicit breakpoints found. Adding virtual breakpoints...');
                    
                    // Add some simulated breakpoints
                    if (currentLanguage === 'python') {
                        addToDebug('Virtual breakpoint at line 3 (function entry)');
                    } else if (currentLanguage === 'javascript') {
                        addToDebug('Virtual breakpoint at line 5 (function call)');
                    }
                }
                
                addToDebug('Debug session ready. Use "Run" to step through code.');
            }, 1200);
        }
        
        function addToDebug(message) {
            const debugPanel = document.getElementById('debug-panel');
            const div = document.createElement('div');
            div.className = 'console-line text-amber-300';
            div.textContent = `[DEBUG] ${message}`;
            debugPanel.appendChild(div);
            debugPanel.scrollTop = debugPanel.scrollHeight;
        }
        
        function clearDebug() {
            document.getElementById('debug-panel').innerHTML = '
<div class="text-slate-400">No breakpoints set
</div>';
        }
        
        // ==================== LINTER ====================
        function lintCode() {
            const editor = document.getElementById('code-editor');
            const code = editor.value;
            const consoleOutput = document.getElementById('console-output');
            
            addToConsole('Running linter...', 'info');
            
            setTimeout(() => {
                let issues = [];
                
                // Basic linting rules
                if (currentLanguage === 'python') {
                    if (!code.includes('if __name__')) {
                        issues.push({type: 'warning', message: 'Missing if __name__ == "__main__" guard'});
                    }
                    if (code.includes('print(') && !code.includes('"""')) {
                        issues.push({type: 'info', message: 'Consider adding docstrings'});
                    }
                }
                
                if (currentLanguage === 'javascript') {
                    if (!code.includes('const ') && !code.includes('let ')) {
                        issues.push({type: 'warning', message: 'Consider using const/let instead of var'});
                    }
                    if (code.includes('==') && !code.includes('===')) {
                        issues.push({type: 'warning', message: 'Use strict equality (===) instead of =='});
                    }
                }
                
                if (issues.length === 0) {
                    addToConsole('✓ No linting issues found', 'success');
                } else {
                    issues.forEach(issue => {
                        const prefix = issue.type === 'warning' ? '⚠' : 'ℹ';
                        addToConsole(`${prefix} ${issue.message}`, issue.type);
                    });
                }
            }, 700);
        }
        
        // ==================== CONSOLE ====================
        function addToConsole(message, type = 'info') {
            const consoleOutput = document.getElementById('console-output');
            const div = document.createElement('div');
            div.className = `console-line ${type === 'error' ? 'error-line' : type === 'success' ? 'success-line' : ''}`;
            div.textContent = message;
            consoleOutput.appendChild(div);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }
        
        function clearConsole() {
            const consoleOutput = document.getElementById('console-output');
            consoleOutput.innerHTML = '
<div class="text-emerald-400 text-xs mb-1">CodeForge Terminal v4.2
</div>';
        }
        
        // ==================== IMPORT/EXPORT ====================
        function exportCode() {
            const editor = document.getElementById('code-editor');
            const code = editor.value;
            
            const blob = new Blob([code], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = currentFile;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            addToConsole(`Exported ${currentFile}`, 'success');
        }
        
        function importCode() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.py,.js,.html,.txt';
            
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const content = ev.target.result;
                    
                    // Create new file or overwrite
                    const newFilename = file.name;
                    
                    files[newFilename] = {
                        content: content,
                        language: detectLanguage(newFilename),
                        lastModified: new Date()
                    };
                    
                    loadFileList();
                    loadFile(newFilename);
                    
                    addToConsole(`Imported ${newFilename}`, 'success');
                };
                reader.readAsText(file);
            };
            
            input.click();
        }
        
        function detectLanguage(filename) {
            if (filename.endsWith('.py')) return 'python';
            if (filename.endsWith('.js')) return 'javascript';
            if (filename.endsWith('.html')) return 'html';
            return 'javascript';
        }
        
        // ==================== TEMPLATES ====================
        function loadTemplate(type) {
            let filename, content, language;
            
            switch(type) {
                case 'flask':
                    filename = 'app.py';
                    language = 'python';
                    content = `# Flask API Template

@app.route('/api/data', methods=['GET', 'POST'])

    if request.method == 'POST':
        return jsonify({"status": "success", "data": request.json})
    return jsonify({"data": [1, 2, 3]})

if __name__ == '__main__':
    app.run(debug=True, port=5000)`;
                    break;
                    
                case 'fastapi':
                    filename = 'main.py';
                    language = 'python';
                    content = `# FastAPI Template

                    break;
                    
                case 'express':
                    filename = 'server.js';
                    language = 'node';
                    content = `// Express Server Template

                    break;
                    
                case 'react':
                    filename = 'Component.jsx';
                    language = 'javascript';
                    content = `// React Component Template

                onClick={() => setCount(count + 1)}
                className="px-4 py-2 bg-blue-500 text-white rounded"
            >
                Increment

    );
};

                    break;
            }
            
            if (filename && content) {
                files[filename] = {
                    content: content,
                    language: language,
                    lastModified: new Date()
                };
                
                loadFileList();
                loadFile(filename);
                addToConsole(`Loaded ${type} template`, 'success');
            }
        }
        
        // Initialize everything
        window.onload = function() {
            initIDE();
            
            // Bonus: Show keyboard shortcuts hint
            setTimeout(() => {
                const consoleEl = document.getElementById('console-output');
                if (consoleEl.children.length
< 3) {
                    // Only show if console is relatively empty
                }
            }, 5000);
        };
        
        // Make some functions globally available for debugging
        window.CodeForge = {
            run: () => runCode(),
            lint: () => lintCode(),
            debug: () => debugCode(),
            export: () => exportCode()
        };
</script>
</body>
